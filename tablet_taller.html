<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taller Operativo - Lavadero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            margin: 0; padding: 2rem;
            font-family: var(--font-sans);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-family: var(--font-display);
            color: var(--color-lime);
            margin: 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .car-card {
            background: var(--color-panel-bg);
            border: 2px solid rgba(255,255,255,0.05);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .car-card.in-wash {
            border-color: rgba(0, 240, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
        }
        .plate-badge {
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-family: var(--font-display);
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .btn-action {
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .btn-blue { background: var(--color-cyan); color: #fff; }
        .btn-green { background: var(--color-lime); color: #000; }
        .btn-yellow { background: #facc15; color: #000; }
        .btn-action:hover { filter: brightness(1.2); }
        .tags {
            display: flex; gap: 0.5rem; flex-wrap: wrap;
        }
        .tag {
            background: rgba(255,255,255,0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔧 Taller Operativo</h1>
        <div id="clock" style="font-family: var(--font-display); font-size: 1.5rem; color: var(--color-cyan);">--:--</div>
    </div>

    <h2 style="color: var(--color-text-dim);">Vehículos en Proceso</h2>
    <div class="grid" id="cars-grid">
        <!-- Generado dinámicamente -->
    </div>

    <script>
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('es-AR'), 1000);

        function loadCars() {
            const saved = localStorage.getItem('lavadero_active_vehicles');
            const activeVehicles = saved ? JSON.parse(saved) : [];
            
            const grid = document.getElementById('cars-grid');
            grid.innerHTML = '';

            // Mostrar autos que estén en "espera" o "lavado"
            const visibleCars = activeVehicles.filter(v => v.zone !== 'terminado');

            if(visibleCars.length === 0) {
                grid.innerHTML = '<p style="color: gray;">No hay vehículos pendientes.</p>';
                return;
            }

            visibleCars.forEach(car => {
                const isWashing = car.zone === 'lavado';
                const hasAspirado = (car.extra_aspirado) ? 'tag-on' : '';
                const hasLustre = (car.extra_lustre) ? 'tag-on' : '';

                let actions = '';
                if(car.zone === 'espera') {
                    actions = `<button class="btn-action btn-blue" onclick="changeZone('${car.id}', 'lavado')">Ingresar a Lavado 💧</button>`;
                } else if(car.zone === 'lavado') {
                    actions = `
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:0.5rem;">
                            <button class="btn-action btn-yellow" onclick="toggleExtra('${car.id}', 'aspirado')">Aspirado</button>
                            <button class="btn-action btn-yellow" onclick="toggleExtra('${car.id}', 'lustre')">Lustre Extra</button>
                        </div>
                        <button class="btn-action btn-green" onclick="changeZone('${car.id}', 'terminado')">✔ Marcar Terminado</button>
                    `;
                }

                const extrasHtml = `
                    ${car.extra_aspirado ? '<span class="tag">🧹 Aspirado Listo</span>' : ''}
                    ${car.extra_lustre ? '<span class="tag">✨ Lustre Aplicado</span>' : ''}
                `;

                grid.innerHTML += `
                    <div class="car-card ${isWashing ? 'in-wash' : ''}">
                        <div style="display:flex; justify-content: space-between; align-items:center;">
                            <strong>${car.nickname}</strong>
                            <div style="width:20px; height:20px; border-radius:50%; background-color:${car.color}; border:2px solid #fff;"></div>
                        </div>
                        <div class="plate-badge">${car.plate || 'S/N'}</div>
                        <div style="font-size: 0.9rem; color: var(--color-text-dim);">${car.description || 'Sin notas'}</div>
                        <div class="tags">${extrasHtml}</div>
                        <div style="flex:1;"></div>
                        <div style="display:flex; flex-direction:column; gap:0.5rem;">
                            ${actions}
                        </div>
                    </div>
                `;
            });
        }

        function changeZone(id, targetZone) {
            const saved = localStorage.getItem('lavadero_active_vehicles');
            if(!saved) return;
            const activeVehicles = JSON.parse(saved);
            const car = activeVehicles.find(v => v.id === id);
            if(car) {
                car.zone = targetZone;
                localStorage.setItem('lavadero_active_vehicles', JSON.stringify(activeVehicles));
                window.dispatchEvent(new Event('storage')); // Forzar update visual
                pushZoneToSupabase(id, targetZone); // Empujar a Supabase
                loadCars();
            }
        }

        function toggleExtra(id, extraType) {
            const saved = localStorage.getItem('lavadero_active_vehicles');
            if(!saved) return;
            const activeVehicles = JSON.parse(saved);
            const car = activeVehicles.find(v => v.id === id);
            if(car) {
                if(extraType === 'aspirado') car.extra_aspirado = !car.extra_aspirado;
                if(extraType === 'lustre') car.extra_lustre = !car.extra_lustre;
                localStorage.setItem('lavadero_active_vehicles', JSON.stringify(activeVehicles));
                window.dispatchEvent(new Event('storage'));
                loadCars();
            }
        }

        // Auto refrescar cuando haya cambios en otras pestañas
        window.addEventListener('storage', (e) => {
            if(e.key === 'lavadero_active_vehicles') {
                loadCars();
            }
        });

        // Fetch from Supabase for remote Tablet
        async function fetchFromSupabase() {
            const config = JSON.parse(localStorage.getItem('lavadero_config') || '{}');
            if (!config.useSupabase || !config.supabaseUrl || !config.supabaseKey) return;
            
            try {
                const url = `${config.supabaseUrl}/rest/v1/${config.queueTable}?select=*&order=entered_at.asc`;
                const response = await fetch(url, {
                    headers: {
                        'apikey': config.supabaseKey,
                        'Authorization': `Bearer ${config.supabaseKey}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const activeVehicles = data.map(dbCar => ({
                        id: dbCar.id,
                        tracking_id: dbCar.tracking_id || Math.floor(Math.random() * 100),
                        nickname: dbCar.nickname || 'Vehículo',
                        plate: dbCar.plate || '',
                        color: dbCar.color || '#06b6d4',
                        zone: dbCar.zone || 'espera',
                        budget: dbCar.budget || 0,
                        description: dbCar.description || ''
                    }));
                    localStorage.setItem('lavadero_active_vehicles', JSON.stringify(activeVehicles));
                    loadCars();
                }
            } catch (err) { }
        }
        
        async function pushZoneToSupabase(id, zone) {
            const config = JSON.parse(localStorage.getItem('lavadero_config') || '{}');
            if (!config.useSupabase) return;
            try {
                const url = `${config.supabaseUrl}/rest/v1/${config.queueTable}?id=eq.${id}`;
                await fetch(url, {
                    method: 'PATCH',
                    headers: {
                        'apikey': config.supabaseKey,
                        'Authorization': `Bearer ${config.supabaseKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ zone: zone })
                });
            } catch (err) { }
        }
        
        setInterval(fetchFromSupabase, 8000); // Poll every 8s
        fetchFromSupabase();

        loadCars();
    </script>

    <footer class="app-footer">
        &copy; 2026 <strong>Omar Adamo</strong>. Todos los derechos reservados. <br>
        Lavadero Estética Vehicular • Software Independiente
    </footer>

</body>
</html>
