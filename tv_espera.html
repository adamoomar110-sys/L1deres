<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos - Café VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            margin: 0; padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            font-family: var(--font-sans);
        }
        .header {
            padding: 1.5rem 3rem;
            background: rgba(9, 9, 11, 0.9);
            border-bottom: 2px solid var(--color-cyan);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-family: var(--font-display);
            margin: 0;
            font-size: 2.5rem;
            color: var(--color-cyan);
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        .main-container {
            flex: 1;
            display: flex;
        }
        .board-col {
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .board-col.in-progress {
            background: linear-gradient(90deg, rgba(255,255,255,0.02), transparent);
            border-right: 1px dashed rgba(255,255,255,0.1);
        }
        .board-col.ready {
            background: linear-gradient(-90deg, rgba(20,255,0,0.05), transparent);
        }
        .col-title {
            font-family: var(--font-display);
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 2rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .in-progress .col-title { color: #facc15; }
        .ready .col-title { color: var(--color-lime); }
        
        .ticket-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            background: var(--color-panel-bg);
            border-radius: 1rem;
            font-size: 1.8rem;
            font-weight: 800;
            animation: fadeIn 0.5s ease;
        }
        .in-progress .ticket-item {
            border-left: 5px solid #facc15;
        }
        .ready .ticket-item {
            border-left: 5px solid var(--color-lime);
            animation: pulse-ready 2s infinite;
        }
        .ticket-number {
            font-family: var(--font-display);
            color: var(--color-cyan);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulse-ready {
            0% { box-shadow: 0 0 0 0 rgba(20, 255, 0, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(20, 255, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(20, 255, 0, 0); }
        }
        .empty-msg {
            text-align: center;
            color: var(--color-text-dim);
            font-style: italic;
            font-size: 1.5rem;
            margin-top: 4rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>TURNO Y ESTADO</h1>
        <div id="clock" style="font-family: var(--font-display); font-size: 2.5rem; color: #fff;">--:--</div>
    </div>

    <div class="main-container">
        <div class="board-col in-progress">
            <h2 class="col-title">EN PREPARACIÓN ⏳</h2>
            <div id="list-progress"></div>
        </div>
        <div class="board-col ready">
            <h2 class="col-title">LISTOS PARA RETIRAR ✨</h2>
            <div id="list-ready"></div>
        </div>
    </div>

    <script>
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('es-AR'), 1000);

        // Sonido al pasar a listo (Opcional, los navegadores pueden bloquear auto-play si no hay interacción)
        // const audioReady = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

        let lastReadyCount = 0;

        function loadBoard() {
            const saved = localStorage.getItem('lavadero_active_vehicles');
            const activeVehicles = saved ? JSON.parse(saved) : [];
            
            const listProg = document.getElementById('list-progress');
            const listReady = document.getElementById('list-ready');
            
            listProg.innerHTML = '';
            listReady.innerHTML = '';

            const inProg = activeVehicles.filter(v => v.zone === 'espera' || v.zone === 'lavado');
            const ready = activeVehicles.filter(v => v.zone === 'terminado');

            if(inProg.length === 0) listProg.innerHTML = '<div class="empty-msg">No hay vehículos en proceso.</div>';
            if(ready.length === 0) listReady.innerHTML = '<div class="empty-msg">No hay vehículos para retirar.</div>';

            inProg.forEach(v => {
                listProg.innerHTML += `
                    <div class="ticket-item">
                        <span class="ticket-number">#${v.tracking_id}</span>
                        <span>${v.plate || v.nickname}</span>
                    </div>
                `;
            });

            ready.forEach(v => {
                listReady.innerHTML += `
                    <div class="ticket-item">
                        <span class="ticket-number">#${v.tracking_id}</span>
                        <span>${v.plate || v.nickname}</span>
                    </div>
                `;
            });

            // Si hay un nuevo "Listo"
            if(ready.length > lastReadyCount) {
                // audioReady.play().catch(e => console.log('Audio autoplay blocked'));
            }
            lastReadyCount = ready.length;
        }

        window.addEventListener('storage', (e) => {
            if(e.key === 'lavadero_active_vehicles') {
                loadBoard();
            }
        });

        loadBoard();

        // Fetch from Supabase for remote TV
        async function fetchFromSupabase() {
            const config = JSON.parse(localStorage.getItem('lavadero_config') || '{}');
            if (!config.useSupabase || !config.supabaseUrl || !config.supabaseKey) return;
            
            try {
                const url = \/rest/v1/\?select=*&order=entered_at.asc\;
                const response = await fetch(url, {
                    headers: {
                        'apikey': config.supabaseKey,
                        'Authorization': \Bearer \
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('lavadero_active_vehicles', JSON.stringify(data));
                    loadBoard();
                }
            } catch (err) {
                // Silently fail or log
            }
        }
        
        setInterval(fetchFromSupabase, 5000); // Poll every 5s
        fetchFromSupabase();
    </script>

    <footer class="app-footer">
        &copy; 2026 <strong>Omar Adamo</strong>. Todos los derechos reservados. <br>
        Lavadero Estética Vehicular • Software Independiente
    </footer>

</body>
</html>
